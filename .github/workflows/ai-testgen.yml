name: AI Test Review

# Portable AI test generation & review. Driven entirely by .aitestgen.toml and
# scripts/ai_testgen.py — nothing project-specific lives in this file, so you can
# copy it into any repo unchanged. For a non-Python target, add your language's
# setup step (e.g. actions/setup-node, actions/setup-go) before "Install deps".

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Diff base ref (blank = HEAD~1)"
        required: false
        default: ""
      head_ref:
        description: "Diff head ref (blank = HEAD)"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-test-review:
    name: AI Test Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so diffs resolve

      # Python runs the orchestrator itself, regardless of the target language.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # (For non-Python targets, add setup-node / setup-go etc. here.)

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install anthropic openai
          # project + test deps, from the config's `install` field
          eval "$(python scripts/ai_testgen.py --print-install)" || true

      - name: Determine diff refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.base_ref }}" ]; then
            echo "base=${{ github.event.inputs.base_ref }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.event.inputs.head_ref || 'HEAD' }}" >> $GITHUB_OUTPUT
          else
            echo "base=HEAD~1" >> $GITHUB_OUTPUT
            echo "head=HEAD"   >> $GITHUB_OUTPUT
          fi

      - name: Run AI Test Pipeline
        id: ai
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER:       ${{ vars.AI_PROVIDER }}
          AI_MODEL:          ${{ vars.AI_MODEL }}
        run: |
          python scripts/ai_testgen.py \
            --base-ref "${{ steps.refs.outputs.base }}" \
            --head-ref "${{ steps.refs.outputs.head }}"
        continue-on-error: true

      - name: Upload generated tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-generated-tests
          path: ${{ github.workspace }}/**/generated/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment bug report on PR
        if: |
          steps.ai.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          hashFiles('bug_report.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: fs.readFileSync('bug_report.md', 'utf8'),
            });

      - name: Open bug issue on push
        if: |
          steps.ai.outcome == 'failure' &&
          github.event_name == 'push' &&
          hashFiles('bug_report.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commit = context.sha.substring(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🐛 AI Test Review: bug detected in ${commit}`,
              body: fs.readFileSync('bug_report.md', 'utf8'),
              labels: ['bug', 'ai-detected'],
            });

      # Only a real (source) bug writes bug_report.md, so it is the true-positive
      # signal. A script exit(1) without the report means an infra error (missing
      # key, rate limit); the script itself exits 0 for unfixable generated tests.
      - name: Fail only on a real bug
        if: |
          steps.ai.outcome == 'failure' &&
          hashFiles('bug_report.md') != ''
        run: |
          echo "❌ AI test review found a real source bug."
          exit 1
