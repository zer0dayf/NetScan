name: AI Test Review

on:
  push:
    branches: [main, master]
    paths:
      - "netscan/**/*.py"
  pull_request:
    paths:
      - "netscan/**/*.py"

# PR yorumu yazabilmek için yazma yetkisi
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-test-gen:
    name: Generate & Review Tests with Claude
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Diff hesaplayabilmek için tam geçmişi çek
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest anthropic openai

      # ── Base referansı belirle ──────────────────────────────────────────────
      - name: Determine diff refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "base=HEAD~1" >> $GITHUB_OUTPUT
            echo "head=HEAD"   >> $GITHUB_OUTPUT
          fi

      # ── AI test üretimi ve sınıflandırma ───────────────────────────────────
      # Hangi key set edilmişse o sağlayıcı otomatik seçilir.
      # Repo secrets'a ANTHROPIC_API_KEY veya DEEPSEEK_API_KEY veya OPENAI_API_KEY ekle.
      - name: Run AI Test Pipeline
        id: ai-pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          AI_PROVIDER:       ${{ vars.AI_PROVIDER }}   # opsiyonel: repo variable
          AI_MODEL:          ${{ vars.AI_MODEL }}       # opsiyonel: model override
        run: |
          python scripts/ai_test_gen.py \
            --base-ref "${{ steps.refs.outputs.base }}" \
            --head-ref "${{ steps.refs.outputs.head }}"
        continue-on-error: true  # Bug raporu durumunda workflow devam etsin

      # ── Üretilen testleri artifact olarak kaydet ────────────────────────────
      - name: Upload generated tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-generated-tests
          path: tests/generated/
          retention-days: 14

      # ── True positive bug varsa PR'a yorum yap ─────────────────────────────
      - name: Comment bug report on PR
        if: |
          steps.ai-pipeline.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          hashFiles('bug_report.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('bug_report.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
            console.log('Bug report posted to PR.');

      # ── Push'ta issue aç ───────────────────────────────────────────────────
      - name: Open bug issue on push
        if: |
          steps.ai-pipeline.outcome == 'failure' &&
          github.event_name == 'push' &&
          hashFiles('bug_report.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('bug_report.md', 'utf8');
            const commit  = context.sha.substring(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🐛 AI Test Review: Bug detected in ${commit}`,
              body:  report,
              labels: ['bug', 'ai-detected']
            });
            console.log('Bug issue created.');

      # ── Pipeline başarısızsa workflow'u da başarısız say ───────────────────
      - name: Fail if true positive bug found
        if: steps.ai-pipeline.outcome == 'failure'
        run: |
          echo "❌ AI test pipeline gerçek bir bug tespit etti."
          exit 1
